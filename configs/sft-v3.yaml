# Phase 2 SFT v3 — over-training control: EXACTLY the proven sft-v2 mix, but 1 epoch
# instead of 2. Single-variable test of the hypothesis that sft-v2's GSM8K regression
# (0.735->0.572) came from over-training (verbosity, rambling, eroded arithmetic).
# No new data, no math added -> no GSM8K eval-distribution contamination. From BASE.
model: Qwen/Qwen3-1.7B-Base
output_dir: checkpoints/sft-v3
dataset: HuggingFaceTB/smoltalk2
dataset_config: SFT
dataset_splits:
  - smoltalk_smollm3_smol_magpie_ultra_no_think
  - tulu_3_sft_personas_instruction_following_no_think
  - smoltalk_smollm3_everyday_conversations_no_think
  - smoltalk_smollm3_systemchats_30k_no_think
subset_size: 100000
max_length: 1024
packing: false
attn_implementation: sdpa
assistant_only_loss: true
num_train_epochs: 1          # <-- the ONLY change vs sft-v2 (was 2)
per_device_train_batch_size: 16
gradient_accumulation_steps: 4
learning_rate: 1.0e-5
lr_scheduler_type: cosine
warmup_ratio: 0.03
weight_decay: 0.0
max_grad_norm: 1.0
bf16: true
gradient_checkpointing: true
logging_steps: 20
save_strategy: epoch
save_total_limit: 1
seed: 42
report_to: none
