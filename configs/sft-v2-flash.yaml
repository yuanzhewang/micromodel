# Phase 2 scaled SFT (sft-v2) — FAST path: flash-attn 2 + packing, 2048 ctx.
model: Qwen/Qwen3-1.7B-Base
output_dir: checkpoints/sft-v2
dataset: HuggingFaceTB/smoltalk2
dataset_config: SFT
dataset_splits:
  - smoltalk_smollm3_smol_magpie_ultra_no_think
  - tulu_3_sft_personas_instruction_following_no_think
  - smoltalk_smollm3_everyday_conversations_no_think
  - smoltalk_smollm3_systemchats_30k_no_think
subset_size: 150000
max_length: 2048
packing: true
attn_implementation: flash_attention_2
assistant_only_loss: true
num_train_epochs: 2
per_device_train_batch_size: 16
gradient_accumulation_steps: 4
learning_rate: 1.0e-5
lr_scheduler_type: cosine
warmup_ratio: 0.03
weight_decay: 0.0
max_grad_norm: 1.0
bf16: true
gradient_checkpointing: true
logging_steps: 20
save_strategy: epoch
save_total_limit: 1
seed: 42
report_to: none
